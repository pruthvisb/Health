version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: healthsphere-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: healthsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthsphere-network

  # Cache
  redis:
    image: redis:7-alpine
    container_name: healthsphere-cache
    restart: always
    ports:
      - "6379:6379"
    networks:
      - healthsphere-network

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: healthsphere-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/healthsphere?schema=public
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - healthsphere-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthsphere-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    depends_on:
      - backend
    networks:
      - healthsphere-network

volumes:
  postgres_data:

networks:
  healthsphere-network:
    driver: bridge
